<div class="vh-100">
  <div class="px-1 g-0 w-full bg-blue z-1000 fixed top-0 flex flex-row flex-wrap" role="banner">
    <a href="/" class="col-auto px-3 mb-0 flex flex-row">
      <img class="icon" width="35" height="50" src="/favicon.ico" alt="icon" />
      <div class="ms-1 text-white">
        <h1 class=" text-decoration-none">{{'common.title' | translate}}</h1>
        <a href="https://www.ikbenhenk.nl" class="text-white text-underline"><small><i>A Ik ben Henk website</i></small></a>
      </div>
    </a>
    @if (showWarning && !showNavigation) {
      <div role="alert" class="location-warning mw-100 flex col-auto flex-row flex-nowrap col-auto border my-2 px-1 bg-warning border-1 rounded border-warning text-dark">
        <div class="d-inline-block">
          <i class="bi bi-exclamation-diamond me-2 fs-4"></i>
          <span>{{'common.location_warningmessage' |translate}}</span>
        </div>
        <div class="d-inline-block">
          <button (click)="closeWarning()" role="button" aria-label="Close location warning" class="btn btn-close"></button>
        </div>
      </div>
    }
    @if (!showWarning && activatedRoute.children.length === 0) {
      <div class="flex flex-row flex-wrap my-auto">
        <label for="twkAuctions" class="mx-1 text-nowrap cursor-pointer rounded-full bg-white my-1 px-2 pb-1 flex flex-row flex-nowrap text-dark auctionbrand"
          [ngClass]="{'notselected': !isActiveAuction('TWK')}">
          <input type="checkbox" class="hidden" id="twkAuctions" role="checkbox" name="twkAuctions" [checked]="isActiveAuction('TWK')" value="TWK" (change)="toggleAuction('TWK')">
          <img class="flex twk-brand-logo brand-logo me-1" src="_assets/images/TWK-logo.png" alt="Troostwijk" />
          <span class="hidden md:block">Troostwijk auctions</span>
        </label>
        <label for="ovmAuctions" class="mx-1 text-nowrap cursor-pointer rounded-full bg-white my-1 px-2 pb-1 flex flex-row flex-nowrap text-dark auctionbrand"
          [ngClass]="{'notselected': !isActiveAuction('OVM')}">
          <input type="checkbox" class="hidden" id="ovmAuctions" role="checkbox" name="ovmAuctions" [checked]="isActiveAuction('OVM')" value="OVM" (change)="toggleAuction('OVM')">
          <img class="flex ovm-brand-logo brand-logo mt-1 me-1" src="_assets/images/OVM-logo.png" alt="Onlineveilingmeester.nl" />
          <span class="hidden md:block">Online veilingmeester.nl</span>
        </label>
        <label for="apAuctions" class="mx-1 text-nowrap cursor-pointer rounded-full bg-white my-1 px-2 pb-1 flex flex-row flex-nowrap text-dark auctionbrand"
          [ngClass]="{'notselected': !isActiveAuction('AP')}">
          <input type="checkbox" class="hidden" id="apAuctions" role="checkbox" name="apAuctions" [checked]="isActiveAuction('AP')" value="AP" (change)="toggleAuction('AP')">
          <img class="flex AP-brand-logo brand-logo mt-1 me-1" src="_assets/images/AP-logo.png" alt="Auctionport" />
          <span class="hidden md:block">Auctionport</span>
        </label>
      </div>
    }
  </div>

  <div class="row g-0 vw-100 justify-content-center bg-light-grey maprow" role="main">
    @if (activatedRoute.children.length === 0) {
      <app-auctions [shownAuctions]="shownAuctions" class="fixed bottom-0 z-1000 auctions-list mb-2"></app-auctions>
      <app-map [auctionbrands]="auctionBrands.value" (shownAuctions)="showAuctions( $event)" class="h-100 z-50"></app-map>
    }
    <router-outlet></router-outlet>

    <!-- Footer -->
    <footer>
    </footer>
  </div>
</div>
<router-outlet></router-outlet>
